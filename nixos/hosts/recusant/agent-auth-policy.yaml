# agent-auth policy — evaluation order per request:
#   1. platform validator (hard ceilings below under `platforms:`) — fail = deny
#   2. saved rules in the DB (created from Discord's Edit modal), newest first
#   3. the `rules:` list below, first match wins
#   4. `defaults.action`
#
# Durations: approved = min(requested, matched rule's max_duration, defaults.max_duration)

defaults:
  action: surface          # deny | approve | llm | surface
  max_duration: 24h

llm:
  model: deepseek/deepseek-v4-flash    # OpenRouter model id; per-rule override via constraints.llm_model
  retry_budget: 2          # LLM denials the agent may retry before human escalation
  timeout_secs: 60

platforms:
  github:
    # GitHub account owners whose repos are brokered (the app must be
    # installed on each)
    repo_allowlist:
      - "otisdog8/*"
      - "uorux/*"
      - "rooty-dev/*"
      - "rootyorg/*"
    # Checked before the allowlist, at the validator layer — no rule (DB or
    # YAML) can override it. nixos-dots configures this broker's host, so a
    # grant there is policy self-escalation; the glob covers forks anywhere.
    repo_denylist:
      - "*/nixos-dots"
    # Hard ceiling — requests above this are denied before any policy rule runs.
    # Must be a subset of what the GitHub App itself was granted (keep this list
    # and the App's permissions in sync; keys are the API permission names).
    permission_ceiling:
      metadata: read        # mandatory App baseline (repo listing/basic info);
                            # listed so a request naming it isn't ceiling-denied
      contents: write
      workflows: write      # pushing .github/workflows/* needs this + contents
      secrets: write
      variables: write
      actions: read
      pull_requests: write
      issues: write
      checks: read
      # org-level — NOT repo-scoped: they apply org-wide on any token that
      # requests them, so nothing below routes them past `surface`
      organization_secrets: write
      organization_variables: write
      organization_self_hosted_runners: read
    # Always forced to human review, even if a future rule or the LLM would
    # approve — justification text can't LLM-talk its way into a secrets
    # grant. Explicit (not schema defaults) because org secrets are in the
    # ceiling above but NOT in upstream's default sensitive list.
    sensitive_permissions:
      - secrets
      - administration
      - organization_secrets
  homelab:
    # LLDAP groups the broker may join an agent into. Authelia rules per group
    # do the actual enforcement. Deliberately excluded: `admin`, plus
    # `lldap_admin` and `lldap_password_manager` — either of those is the keys
    # to the directory the broker itself provisions through (an agent holding
    # them could join itself to any group / reset any password, bypassing every
    # ceiling here).
    allowed_groups:
      - alertmanager-users
      - bazarr-anime-users
      - bazarr-users
      - bin-users
      - calibre-admins
      - calibre-users
      - cyberchef-users
      - enclosed-users
      - gitea-admins
      - gitea-users
      - grafana-admins
      - grafana-users
      - homepage-users
      - hubble-users
      - immich-admins
      - immich-users
      - jellyfin-admins
      - jellyfin-users
      - kubedash-users
      - lazylibrarian-users
      - librechat-users
      - lidarr-users
      - linkwarden-users
      - lldap_strict_readonly
      - paperless-users
      - prowlarr-users
      - radarr-anime-users
      - radarr-users
      - rook-users
      - sonarr-anime-users
      - sonarr-users
      - spotify-dashboard-users
      - stirling-pdf-users
      - suwayomi-users
      - thelounge-users
      - traefik-users
    # Per-group blurbs surfaced to agents via GET /v1/catalog so they request
    # the narrowest group that fits. Inferred from group names — correct any
    # that are wrong.
    group_descriptions:
      alertmanager-users: "Alertmanager UI — view and silence alerts"
      bazarr-anime-users: "Bazarr (anime library) — subtitle management"
      bazarr-users: "Bazarr — subtitle management"
      bin-users: "bin — pastebin"
      calibre-admins: "Calibre-Web admin — manage the ebook library"
      calibre-users: "Calibre-Web — read/download ebooks"
      cyberchef-users: "CyberChef — data transformation toolbox"
      enclosed-users: "Enclosed — encrypted note sharing"
      gitea-admins: "Gitea admin — full forge administration (broad)"
      gitea-users: "Gitea — git hosting, per-repo permissions apply"
      grafana-admins: "Grafana admin — manage dashboards and datasources (broad)"
      grafana-users: "Grafana — view dashboards (the right pick for metrics questions)"
      homepage-users: "Homepage — service directory/links"
      hubble-users: "Hubble UI — Cilium network flow observability"
      immich-admins: "Immich admin — photo library administration (broad)"
      immich-users: "Immich — photo library"
      jellyfin-admins: "Jellyfin admin — server administration (broad)"
      jellyfin-users: "Jellyfin — media streaming"
      kubedash-users: "Kubernetes dashboard — cluster resource view"
      lazylibrarian-users: "LazyLibrarian — book download automation"
      librechat-users: "LibreChat — LLM chat UI"
      lidarr-users: "Lidarr — music download automation"
      linkwarden-users: "Linkwarden — bookmark manager"
      lldap_strict_readonly: "LLDAP directory — strict read-only view of users/groups"
      paperless-users: "Paperless-ngx — document archive"
      prowlarr-users: "Prowlarr — indexer management"
      radarr-anime-users: "Radarr (anime library) — movie download automation"
      radarr-users: "Radarr — movie download automation"
      rook-users: "Rook/Ceph dashboard — storage cluster status"
      sonarr-anime-users: "Sonarr (anime library) — TV download automation"
      sonarr-users: "Sonarr — TV download automation"
      spotify-dashboard-users: "Spotify dashboard — listening stats"
      stirling-pdf-users: "Stirling-PDF — PDF manipulation tools"
      suwayomi-users: "Suwayomi — manga server"
      thelounge-users: "The Lounge — IRC web client"
      traefik-users: "Traefik dashboard — ingress/router status"
  kubernetes:
    # Any namespace is brokerable — containment comes from narrow roles and
    # human review, not from walling namespaces off (an agent with gitops
    # access can reach them regardless).
    namespace_allowlist:
      - "*"
    # The capability IS the role. This list must match the `bind`
    # resourceNames of the agent-auth-provisioner ClusterRole in the
    # agent-auth repo's deploy/k8s.yaml (re-apply it on the cluster when this
    # changes) — the broker can only hand out roles it can bind, and widening
    # this list widens the broker's own standing credential.
    role_allowlist:
      - view
      - logs-reader       # get+list pods and pod logs
      - traefik-patcher   # get+patch on deployments/traefik only
      - edit
      - workload-manager  # patch/scale deployments + statefulsets
      - cm-editor         # update/patch existing configmaps
      - port-forwarder    # pods/portforward
      - job-runner        # create/delete batch jobs (arbitrary code in namespace)
      - pod-exec          # pods/exec — sensitive
      - secret-reader     # get/list secrets — sensitive
    # Shown to agents via GET /v1/catalog so they pick the right narrow role.
    role_descriptions:
      view: "read-only access to all resources in the namespace — already includes pod logs and events (no need to also request logs-reader)"
      logs-reader: "read pod logs (get + list on pods and pods/log)"
      traefik-patcher: "get + patch the traefik Deployment only — nothing else"
      edit: "full read-write in the namespace (broad: can run pods as any SA)"
      workload-manager: "restart/scale/patch deployments and statefulsets (get/list/watch/patch + scale subresource; read replicasets and pods for rollout status) — note: patch can also change images/env"
      cm-editor: "edit existing configmaps (get/list/watch/update/patch — no create/delete)"
      port-forwarder: "port-forward into pods (get/list pods + create pods/portforward)"
      job-runner: "create/watch/delete batch Jobs and read their pod logs — runs arbitrary code in the namespace"
      pod-exec: "exec into running pods (get/list pods + create pods/exec)"
      secret-reader: "read secrets in the namespace (get/list)"
    # Always human-reviewed, even if the commented auto-approve rules below
    # are ever adopted — none of these ever ride an auto-approval or LLM
    # verdict.
    sensitive_roles:
      - edit
      - admin
      - pod-exec
      - secret-reader

# No routing rules: everything falls through to defaults.action: surface, and
# the nixos-dots ban lives in repo_denylist above (validator layer, stronger
# than any rule). Upstream's example auto-approves the narrow k8s roles so
# friction scales with blast radius — uncomment to adopt:
rules: []
