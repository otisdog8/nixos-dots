keys:
  - &recusant_host age1vawwp80rdgfkajed3tvluzgucl3ykh8ra5r4ullqcze8hj4lr9jsldezda
  - &galaxy_host age17r8aq0y6mrtwqtwffp6t9a8fu0pdar6yerwzq6sr4m6ppk880gwqypxy6k
  # Admin workstation (constitution host key). Lets you edit secrets directly
  # from constitution without SSHing to a host that holds a recipient key.
  - &constitution_host age1850lrhfzq39frupln50mgqwxhgzlv78kzmgwxadk0wszxgxlhausq86luv
  - &excelsior_host age1a3h89x7vayasxmrvjhvqws2da6ck8jnpe8gxhjfutke9u7x83anqnls6u4
creation_rules:
  # Constitution: borg backup passphrase (borgbase).
  - path_regex: .*constitution\.yaml
    age:
      - *constitution_host
      - *galaxy_host
  # Galaxy: borg backup passphrase (borgbase).
  - path_regex: .*galaxy\.yaml
    age:
      - *galaxy_host
      - *constitution_host
  # Excelsior: borg backup passphrase (borgbase).
  - path_regex: .*excelsior\.yaml
    age:
      - *excelsior_host
      - *galaxy_host
      - *constitution_host
  - path_regex: .*recusant\.yaml
    age:
      - *recusant_host
      - *galaxy_host
      - *constitution_host
  # agent-auth secrets (dotenv env file + binary credentials like the GitHub
  # App PEM and the k8s provisioner token).
  - path_regex: .*recusant/secrets/agent-auth.*
    age:
      - *recusant_host
      - *galaxy_host
      - *constitution_host
  # Hermes agent zones (per-agent dotenv env files) + the shared hindsight
  # memory service.
  - path_regex: .*recusant/secrets/(hermes-homelab-recusant|hindsight).*
    age:
      - *recusant_host
      - *galaxy_host
      - *constitution_host
  # Attic binary cache: RS256 JWT signing secret + the Garage S3 access key.
  - path_regex: .*recusant/secrets/atticd.*
    age:
      - *recusant_host
      - *galaxy_host
      - *constitution_host
  # Garage S3: inter-node RPC secret (GARAGE_RPC_SECRET).
  - path_regex: .*recusant/secrets/garage.*
    age:
      - *recusant_host
      - *galaxy_host
      - *constitution_host
